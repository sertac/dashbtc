# AlwaysData Deployment Configuration
# https://www.alwaysdata.com/

[deployment]
# Deployment method: git or ftp
type = git
repository = https://github.com/YOUR_USERNAME/dashbtc.git
branch = main

# Python configuration
python_version = 3.11
wsgi_file = wsgi.py
wsgi_callable = application

# Environment variables
environment = 
    PYTHONPATH=/home/dashbtc
    FLASK_ENV=production

# Database (SQLite - already included)
# No additional setup needed

# Cron jobs (optional - for background tasks)
# [cron]
# command = cd /home/dashbtc && python btc35.py
# schedule = */1 * * * *
